services:
  dsli:
    build: .
    container_name: days-since-last-incident
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      # Persist the SQLite database and secret key outside the container
      - dsli_data:/app/instance
    environment:
      # LDAP settings — override here or in a .env file
      LDAP_SERVER: "ldap.example.com"
      LDAP_DOMAIN: "EXAMPLE"
      LDAP_BASE_DN: "dc=example,dc=com"
      LDAP_REQUIRED_GROUP: "IT_Administrators"
      # LDAP_USE_SSL: "true"   # uncomment to use LDAPS (port 636)

volumes:
  dsli_data:
