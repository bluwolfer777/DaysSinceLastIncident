<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — Days Since Last Incident</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body { background: #0d1117; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; width: 100%; max-width: 400px; }
    .card-header { background: #1c2128; border-bottom: 1px solid #30363d; font-weight: 600; color: #e6edf3; }
    .form-label { color: #8b949e; }
    .form-control { background: #0d1117; border-color: #30363d; color: #e6edf3; }
    .form-control:focus { background: #0d1117; border-color: #58a6ff; color: #e6edf3; box-shadow: 0 0 0 3px rgba(88,166,255,.15); }
    .form-control::placeholder { color: #484f58; }
    .btn-primary { background: #238636; border-color: #238636; font-weight: 600; }
    .btn-primary:hover { background: #2ea043; border-color: #2ea043; }
    small { color: #484f58; }
  </style>
</head>
<body>
  <div class="card shadow-lg p-4">
    <div class="card-header rounded-top mb-3 px-0 ps-2">
      Admin Login
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }} py-2 small">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form method="post" novalidate>
      <div class="mb-3">
        <label for="username" class="form-label">Domain username</label>
        <input
          type="text"
          id="username"
          name="username"
          class="form-control"
          placeholder="e.g. jsmith"
          autocomplete="username"
          required
          autofocus
        />
        <small>Must be a member of <code>GG_Sistemisti</code> on <code>samt.lan</code></small>
      </div>
      <div class="mb-4">
        <label for="password" class="form-label">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          class="form-control"
          autocomplete="current-password"
          required
        />
      </div>
      <div class="d-grid">
        <button type="submit" class="btn btn-primary">Sign in</button>
      </div>
    </form>

    <div class="mt-3 text-center">
      <a href="{{ url_for('dashboard') }}" class="text-secondary small">← Back to dashboard</a>
    </div>
  </div>
</body>
</html>
